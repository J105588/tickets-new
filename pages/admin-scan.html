<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAZUNAP - チェックイン</title>
    <link rel="icon" href="https://www.ichigaku.ac.jp/html/top/images/img_topics04.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/admin-scan.css">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="../assets/js/config.js"></script>
    <script src="../assets/js/maintenance-check.js"></script>
</head>

<body>

    <!-- Background Image -->
    <div class="bg-static"
        style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background-image: url('https://www.ichigaku.ac.jp/wp-content/uploads/2021/09/12-scaled.jpg'); background-size: cover; background-position: center; background-attachment: fixed; filter: brightness(0.6);">
    </div>

    <!-- Login Overlay -->
    <div id="login-overlay"
        style="position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); display: none; justify-content: center; align-items: center; z-index: 9999;">
        <div class="card" style="width: 90%; max-width: 400px; text-align: center;">
            <h2 style="justify-content: center; margin-bottom: 1.5rem;">入場管理用パスワード入力</h2>
            <form id="login-form">
                <div class="form-group">
                    <input type="password" id="admin-password" placeholder="パスワードを入力" required style="width: 100%;">
                </div>
                <button type="submit" id="btn-login" class="btn-lg btn-primary" style="margin-top: 10px;">ログイン</button>
                <div id="login-error-msg"
                    style="color: #ef4444; margin-top: 1rem; font-size: 0.875rem; display: none; background: #fee2e2; padding: 0.5rem; border-radius: 8px;">
                    パスワードが間違っています</div>
            </form>
        </div>
    </div>
    <!-- Global Loader Overlay -->
    <div id="global-loader"
        style="position: fixed; inset: 0; background: rgba(15, 23, 42, 0.85); display: none; justify-content: center; align-items: center; flex-direction: column; z-index: 10000; color: white;">
        <div class="spinner" style="border-top-color: #6366f1;"></div>
        <p style="margin-top: 20px; font-weight: 600; font-size: 1.1rem; letter-spacing: 0.05em;">処理中...</p>
    </div>

    <header class="scan-header">
        <div class="logo">市川学園座席管理システム</div>
        <!-- No logout or menu needed -->
    </header>

    <main class="scan-main">
        <div class="container">

            <!-- Step 1: Configuration -->
            <section id="setup-section" class="card">
                <h2><span class="step-badge">1</span> 対象設定</h2>
                <p class="desc">ご担当の公演情報を選択してください</p>

                <div class="form-group">
                    <label>団体 (Group)</label>
                    <div class="select-wrapper">
                        <select id="target-group">
                            <option value="" disabled selected>読み込み中...</option>
                        </select>
                    </div>
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label>日程 (Day)</label>
                        <div class="select-wrapper">
                            <select id="target-day" disabled>
                                <option value="">-</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>時間 (Time)</label>
                        <div class="select-wrapper">
                            <select id="target-timeslot" disabled>
                                <option value="">-</option>
                            </select>
                        </div>
                    </div>
                </div>

                <button id="btn-start-scan" class="btn-lg btn-primary" disabled>
                    スキャンを開始
                </button>
            </section>

            <!-- Step 2: Scanning -->
            <section id="scan-section" class="card" style="display:none;">
                <div class="scan-header-bar">
                    <div class="current-target">
                        <span id="disp-target-group">Group</span>
                        <span id="disp-target-time">Day 1 / A</span>
                    </div>
                    <button id="btn-change-mode" class="btn-sm">設定変更</button>
                </div>

                <div class="tab-group">
                    <button class="tab active" data-tab="camera">カメラ</button>
                    <button class="tab" data-tab="manual">手入力</button>
                </div>

                <!-- Camera View -->
                <div id="tab-camera" class="tab-content active">
                    <div id="reader-wrapper">
                        <div id="reader"></div>
                    </div>
                    <p class="hint">QRコードをカメラに向けてください</p>
                </div>

                <!-- Manual Input View -->
                <div id="tab-manual" class="tab-content">
                    <div class="manual-form">
                        <div class="form-group">
                            <label>予約ID</label>
                            <input type="number" id="manual-id" placeholder="IDを入力">
                        </div>
                        <div class="form-group">
                            <label>パスコード (4桁)</label>
                            <input type="text" id="manual-pass" placeholder="パスコードを入力">
                            <small>※QR読取不可時にチケット記載のコードを入力</small>
                        </div>
                        <button id="btn-manual-check" class="btn-lg btn-secondary">照会実行</button>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- Modal for Result -->
    <div id="result-overlay" class="overlay" style="display:none;">
        <div class="result-card">
            <div id="res-icon-area"></div>
            <h3 id="res-title">確認</h3>
            <div id="res-content" class="res-details"></div>

            <div class="res-actions">
                <button id="btn-confirm-checkin" class="btn-lg btn-success">チェックイン</button>
                <button id="btn-cancel-checkin" class="btn-lg btn-outline">閉じる</button>
            </div>
        </div>
    </div>

    <!-- Toast for success -->
    <div id="toast" class="toast"></div>

    <script type="module" src="../assets/js/pwa-update.js"></script>
    <script type="module" src="../assets/js/system-lock.js"></script>
    <script type="module" src="../assets/js/admin-scan.js?v=2"></script>
</body>

</html>
